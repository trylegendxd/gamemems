settings:
  check_interval_minutes: 10
  min_margin_percent: 20
  min_profit_eur: 25
  request_delay_seconds: 3              # legacy: per-host minimum interval
  require_location_match: true
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/123 Safari/537.36"

  # ── Pricing / reliability ─────────────────────────────────────────────────
  outlier_method: iqr                   # "iqr" or "mad"
  outlier_iqr_multiplier: 1.0
  outlier_mad_threshold: 3.5
  exclude_bundle_listings: true
  filter_damaged_market_refs: true      # exclude damaged refs from medians

  min_sample_size: 8                    # raw size required before alerting
  min_filtered_sample_size: 5           # post-trim size required before alerting
  min_reliability_score: 0.55           # 0..1; below this → "unreliable"
  min_match_type_for_alert: partial     # "exact" | "partial" | "global"
  market_cache_ttl_minutes: 60
  price_drop_threshold_percent: 10
  seen_max_age_days: 60

  # ── Scraper concurrency / rate limiting (overridable via env vars) ────────
  # Defaults are conservative to avoid OLX soft-bans. Override per env if you
  # need to tune in production:
  #   SCRAPER_GLOBAL_CONCURRENCY, SCRAPER_PER_HOST_CONCURRENCY,
  #   SCRAPER_MIN_HOST_INTERVAL, WATCH_WORKER_COUNT.
  scraper:
    global_concurrency: 4               # max in-flight HTTP requests across all hosts
    per_host_concurrency: 2             # max in-flight per host (OLX, CustoJusto)
    min_host_interval_seconds: 0.8      # gate between requests to the same host
    jitter_min_seconds: 0.5             # randomized sleep before each request
    jitter_max_seconds: 2.5
    request_timeout_seconds: 20
    retry_max_attempts: 3
    retry_backoff_base_seconds: 1.5     # exponential backoff: base * 2**attempt
    pause_on_softban_seconds: 90        # full pause for the host after repeated 429/403
    softban_consecutive_threshold: 3    # how many 429/403 in a row trip the pause
    watch_worker_count: 4               # per-watchlist thread pool size

location_filter:
  allowed_locations:
