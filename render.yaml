# Render blueprint: one PostgreSQL database + one web service running both
# the dashboard and the background scraper in the same process.
#
# The scraper survives restarts because all state lives in PostgreSQL
# (deals + seen_listings tables). To deploy:
#   1. Push this repo to GitHub.
#   2. In Render, click "New" -> "Blueprint", point it at the repo.
#   3. Render reads this file, creates the DB and the web service.
#   4. Set TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, DASHBOARD_PASSWORD,
#      SESSION_SECRET in the dashboard (they are marked sync: false).
#
# Free Postgres on Render has a 90-day lifetime, then becomes paid. Free web
# services sleep after inactivity; for a 24/7 scraper, use Starter plan.

databases:
  - name: olx-flip-db
    plan: free                 # bump to "starter" or higher for production
    databaseName: olxflip
    user: olxflip

services:
  - type: web
    name: olx-flip-bot
    runtime: python
    plan: free                 # starter for 24/7 scraping
    region: frankfurt          # closest to PT, change if you prefer
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    # Single gunicorn worker so we have exactly one scraper thread.
    # Long --timeout because some pages take a few seconds to fetch.
    startCommand: gunicorn --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: olx-flip-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: RUN_SCRAPER
        value: "true"
      - key: SCRAPER_INTERVAL_MINUTES
        value: "10"
      - key: SCRAPER_RUN_ON_STARTUP
        value: "true"
      - key: CONFIG_PATH
        value: config.yml
      - key: DASHBOARD_USER
        value: admin
      # ─ Secrets to set in the Render dashboard (sync: false hides defaults)
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: BASE_URL
        sync: false
      # ─ Browser-extension API (set EXTENSION_API_TOKEN to enable /api/evaluate)
      - key: EXTENSION_API_TOKEN
        sync: false
      - key: EXTENSION_ALLOWED_ORIGIN
        sync: false
      - key: EXTENSION_LIVE_FETCH
        value: "false"
      # ─ Scraper concurrency overrides (defaults set in config.yml)
      - key: SCRAPER_GLOBAL_CONCURRENCY
        value: "4"
      - key: SCRAPER_PER_HOST_CONCURRENCY
        value: "2"
      - key: SCRAPER_MIN_HOST_INTERVAL
        value: "0.8"
      - key: WATCH_WORKER_COUNT
        value: "4"
